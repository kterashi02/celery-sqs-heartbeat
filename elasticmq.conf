// ローカル SQS 互換サーバ ElasticMQ の設定。
// base となる VisibilityTimeout を短く(10秒)設定し、ハートビートの効果を素早く観察できるようにする。
include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
}

queues {
  jobs {
    defaultVisibilityTimeout = 10 seconds
  }
}
